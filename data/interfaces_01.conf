# Random interfaces configuration 1
auto lo eth0

iface lo inet loopback

iface eth0 inet static
    address 172.27.111.90
    netmask 255.255.255.0
    gateway 172.27.111.1
    network 172.27.111.0
    broadcast 172.27.111.255
    dns-nameservers 208.67.222.222

mapping eth0
    script /usr/local/bin/get-network
    map vpn static
    map office loopback
    map vpn fallback
