# Random interfaces configuration 19
auto lo eth0

iface lo inet loopback

iface eth0 inet static
    address 172.29.253.219
    netmask 255.255.255.0
    gateway 172.29.253.1
    network 172.29.253.0
    dns-nameservers 8.8.8.8 1.1.1.1

mapping eth0
    script /usr/local/bin/get-network
    map lab dhcp
    map vpn dhcp
