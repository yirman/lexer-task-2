# Random interfaces configuration 26
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet static
    address 192.168.68.176
    netmask 255.255.255.0
    gateway 192.168.68.1
    network 192.168.68.0
    broadcast 192.168.68.255
    dns-nameservers 9.9.9.9 208.67.222.222 1.1.1.1

iface eth1 inet static
    address 10.250.28.116
    netmask 255.255.255.0
    gateway 10.250.28.1
    network 10.250.28.0
    broadcast 10.250.28.255
    dns-nameservers 8.8.8.8

iface eth2 inet static
    address 172.20.5.22
    netmask 255.255.255.0
    gateway 172.20.5.1
    network 172.20.5.0
    dns-nameservers 8.8.8.8

mapping eth0
    script /usr/local/bin/select-profile
    map lab static
    map office loopback
    map vpn loopback
