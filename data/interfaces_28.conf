# Random interfaces configuration 28
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 172.19.131.3
    netmask 255.255.255.0
    gateway 172.19.131.1
    network 172.19.131.0
    broadcast 172.19.131.255
    dns-nameservers 8.8.8.8 9.9.9.9

iface eth1 inet static
    address 172.18.177.59
    netmask 255.255.255.0
    gateway 172.18.177.1
    network 172.18.177.0
    broadcast 172.18.177.255
    dns-nameservers 208.67.222.222 8.8.8.8

mapping eth0
    script /usr/local/bin/select-profile
    map vpn static
    map lab dhcp

mapping eth1
    script /usr/local/bin/select-profile
    map vpn fallback
    map vpn fallback
    map vpn static
