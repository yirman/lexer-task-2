# Random interfaces configuration 18
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet dhcp

iface eth1 inet static
    address 172.31.178.24
    netmask 255.255.255.0
    gateway 172.31.178.1
    network 172.31.178.0
    dns-nameservers 8.8.8.8 208.67.222.222

iface eth2 inet static
    address 192.168.151.137
    netmask 255.255.255.0
    gateway 192.168.151.1
    broadcast 192.168.151.255
    dns-nameservers 9.9.9.9 1.1.1.1

mapping eth0
    script /usr/local/bin/select-profile
    map home fallback

mapping eth1
    script /usr/local/bin/select-profile
    map lab loopback
    map office dhcp
