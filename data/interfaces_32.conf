# Random interfaces configuration 32
auto lo eth0 eth1 eth2 eth3

iface lo inet loopback

iface eth0 inet static
    address 172.20.187.178
    netmask 255.255.255.0
    gateway 172.20.187.1
    broadcast 172.20.187.255
    dns-nameservers 208.67.222.222 1.1.1.1 9.9.9.9

iface eth1 inet static
    address 172.26.60.177
    netmask 255.255.255.0
    gateway 172.26.60.1
    network 172.26.60.0
    broadcast 172.26.60.255
    dns-nameservers 1.1.1.1 9.9.9.9

iface eth2 inet static
    address 192.168.93.26
    netmask 255.255.255.0
    gateway 192.168.93.1
    network 192.168.93.0
    dns-nameservers 1.1.1.1 8.8.8.8

iface eth3 inet static
    address 10.158.79.183
    netmask 255.255.255.0
    gateway 10.158.79.1
    network 10.158.79.0
    broadcast 10.158.79.255
    dns-nameservers 1.1.1.1 8.8.8.8 9.9.9.9

mapping eth0
    script /opt/net/profile-map
    map office dhcp
    map vpn static
