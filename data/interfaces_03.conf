# Random interfaces configuration 3
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet static
    address 10.115.131.36
    netmask 255.255.255.0
    gateway 10.115.131.1
    broadcast 10.115.131.255
    dns-nameservers 8.8.8.8 208.67.222.222 1.1.1.1

iface eth1 inet static
    address 10.239.3.193
    netmask 255.255.255.0
    gateway 10.239.3.1
    network 10.239.3.0
    broadcast 10.239.3.255
    dns-nameservers 9.9.9.9 1.1.1.1

iface eth2 inet static
    address 192.168.11.92
    netmask 255.255.255.0
    gateway 192.168.11.1
    network 192.168.11.0
    broadcast 192.168.11.255
    dns-nameservers 8.8.8.8 208.67.222.222

mapping eth0
    script /usr/local/bin/select-profile
    map lab dhcp
    map vpn loopback

mapping eth1
    script /opt/net/profile-map
    map office static
