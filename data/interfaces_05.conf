# Random interfaces configuration 5
auto lo eth0 eth1 eth2 eth3

iface lo inet loopback

iface eth0 inet static
    address 10.229.85.160
    netmask 255.255.255.0
    gateway 10.229.85.1
    dns-nameservers 9.9.9.9 208.67.222.222 1.1.1.1

iface eth1 inet static
    address 172.29.97.193
    netmask 255.255.255.0
    gateway 172.29.97.1
    network 172.29.97.0
    dns-nameservers 8.8.8.8 9.9.9.9

iface eth2 inet dhcp

iface eth3 inet static
    address 172.21.110.146
    netmask 255.255.255.0
    gateway 172.21.110.1
    network 172.21.110.0
    broadcast 172.21.110.255
    dns-nameservers 9.9.9.9 8.8.8.8 1.1.1.1

mapping eth1
    script /usr/local/bin/select-profile
    map office dhcp
    map vpn dhcp

mapping eth2
    script /usr/local/bin/get-network
    map lab dhcp
    map office loopback
    map lab dhcp

mapping eth3
    script /usr/local/bin/select-profile
    map home fallback
    map lab fallback
    map lab static

mapping eth0
    script /usr/local/bin/select-profile
    map lab static
    map vpn loopback
    map home fallback
