# Random interfaces configuration 35
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet dhcp

iface eth1 inet dhcp

iface eth2 inet static
    address 172.23.11.140
    netmask 255.255.255.0
    gateway 172.23.11.1
    network 172.23.11.0
    broadcast 172.23.11.255
    dns-nameservers 208.67.222.222 8.8.8.8

mapping eth2
    script /usr/local/bin/select-profile
    map vpn loopback
    map lab fallback

mapping eth0
    script /usr/local/bin/select-profile
    map lab static
    map home static

mapping eth1
    script /usr/local/bin/select-profile
    map vpn loopback
    map lab static
    map lab fallback
