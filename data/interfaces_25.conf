# Random interfaces configuration 25
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 172.27.28.86
    netmask 255.255.255.0
    gateway 172.27.28.1
    network 172.27.28.0
    dns-nameservers 208.67.222.222

iface eth1 inet static
    address 172.28.120.105
    netmask 255.255.255.0
    gateway 172.28.120.1
    network 172.28.120.0
    broadcast 172.28.120.255
    dns-nameservers 1.1.1.1

mapping eth0
    script /opt/net/profile-map
    map lab fallback
    map office loopback
