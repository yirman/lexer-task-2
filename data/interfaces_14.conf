# Random interfaces configuration 14
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet static
    address 10.254.83.228
    netmask 255.255.255.0
    gateway 10.254.83.1
    network 10.254.83.0
    dns-nameservers 8.8.8.8 208.67.222.222 1.1.1.1

iface eth1 inet static
    address 172.27.242.127
    netmask 255.255.255.0
    gateway 172.27.242.1
    network 172.27.242.0
    broadcast 172.27.242.255
    dns-nameservers 9.9.9.9 1.1.1.1 8.8.8.8

iface eth2 inet static
    address 172.21.216.52
    netmask 255.255.255.0
    gateway 172.21.216.1
    broadcast 172.21.216.255
    dns-nameservers 208.67.222.222 8.8.8.8 1.1.1.1

mapping eth1
    script /usr/local/bin/get-network
    map office loopback
    map lab static
    map lab fallback

mapping eth2
    script /usr/local/bin/get-network
    map lab fallback
    map office dhcp
    map home fallback
