# Random interfaces configuration 10
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet dhcp

iface eth1 inet static
    address 10.249.189.121
    netmask 255.255.255.0
    gateway 10.249.189.1
    network 10.249.189.0
    dns-nameservers 208.67.222.222 8.8.8.8

iface eth2 inet static
    address 10.185.212.207
    netmask 255.255.255.0
    gateway 10.185.212.1
    broadcast 10.185.212.255
    dns-nameservers 208.67.222.222

mapping eth2
    script /usr/local/bin/get-network
    map lab loopback

mapping eth0
    script /usr/local/bin/get-network
    map lab loopback
    map lab dhcp

mapping eth1
    script /usr/local/bin/select-profile
    map vpn static
    map lab fallback
