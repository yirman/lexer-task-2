# Random interfaces configuration 37
auto lo eth0 eth1 eth2 eth3

iface lo inet loopback

iface eth0 inet static
    address 10.79.212.202
    netmask 255.255.255.0
    gateway 10.79.212.1
    network 10.79.212.0
    broadcast 10.79.212.255
    dns-nameservers 1.1.1.1

iface eth1 inet static
    address 192.168.177.235
    netmask 255.255.255.0
    gateway 192.168.177.1
    network 192.168.177.0
    broadcast 192.168.177.255
    dns-nameservers 208.67.222.222 9.9.9.9

iface eth2 inet static
    address 10.40.243.52
    netmask 255.255.255.0
    gateway 10.40.243.1
    network 10.40.243.0
    broadcast 10.40.243.255
    dns-nameservers 1.1.1.1 9.9.9.9 8.8.8.8

iface eth3 inet dhcp

mapping eth2
    script /usr/local/bin/select-profile
    map home dhcp
    map home dhcp
    map office fallback

mapping eth1
    script /opt/net/profile-map
    map office static
    map lab fallback
    map lab fallback

mapping eth0
    script /usr/local/bin/get-network
    map lab dhcp
