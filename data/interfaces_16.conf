# Random interfaces configuration 16
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet dhcp

iface eth1 inet static
    address 192.168.205.119
    netmask 255.255.255.0
    gateway 192.168.205.1
    network 192.168.205.0
    broadcast 192.168.205.255
    dns-nameservers 8.8.8.8 208.67.222.222 9.9.9.9

mapping eth1
    script /usr/local/bin/select-profile
    map lab fallback
    map office static

mapping eth0
    script /usr/local/bin/get-network
    map office dhcp
    map home loopback
    map home loopback
