# Random interfaces configuration 38
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 10.145.77.71
    netmask 255.255.255.0
    gateway 10.145.77.1
    broadcast 10.145.77.255
    dns-nameservers 8.8.8.8

iface eth1 inet dhcp

mapping eth0
    script /opt/net/profile-map
    map home loopback
    map home static
    map vpn fallback

mapping eth1
    script /usr/local/bin/select-profile
    map vpn fallback
    map home static
    map home loopback
