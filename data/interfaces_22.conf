# Random interfaces configuration 22
auto lo eth0 eth1 eth2 eth3

iface lo inet loopback

iface eth0 inet dhcp

iface eth1 inet static
    address 10.219.235.207
    netmask 255.255.255.0
    gateway 10.219.235.1
    network 10.219.235.0
    broadcast 10.219.235.255
    dns-nameservers 208.67.222.222

iface eth2 inet static
    address 10.173.123.183
    netmask 255.255.255.0
    gateway 10.173.123.1
    network 10.173.123.0
    dns-nameservers 208.67.222.222

iface eth3 inet static
    address 10.147.253.167
    netmask 255.255.255.0
    gateway 10.147.253.1
    network 10.147.253.0
    dns-nameservers 1.1.1.1

mapping eth3
    script /usr/local/bin/get-network
    map vpn fallback
