# Random interfaces configuration 8
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet static
    address 192.168.66.248
    netmask 255.255.255.0
    gateway 192.168.66.1
    dns-nameservers 8.8.8.8 208.67.222.222

iface eth1 inet static
    address 172.29.139.183
    netmask 255.255.255.0
    gateway 172.29.139.1
    network 172.29.139.0
    broadcast 172.29.139.255
    dns-nameservers 1.1.1.1

iface eth2 inet dhcp

mapping eth2
    script /usr/local/bin/select-profile
    map office dhcp
    map vpn static
    map lab static

mapping eth0
    script /usr/local/bin/get-network
    map lab fallback

mapping eth1
    script /opt/net/profile-map
    map lab dhcp
    map home fallback
