# Random interfaces configuration 4
auto lo eth0

iface lo inet loopback

iface eth0 inet static
    address 10.106.139.159
    netmask 255.255.255.0
    gateway 10.106.139.1
    network 10.106.139.0
    broadcast 10.106.139.255
    dns-nameservers 1.1.1.1 208.67.222.222 8.8.8.8

mapping eth0
    script /usr/local/bin/get-network
    map office dhcp
    map vpn static
