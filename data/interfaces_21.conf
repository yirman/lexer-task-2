# Random interfaces configuration 21
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet static
    address 10.213.229.72
    netmask 255.255.255.0
    gateway 10.213.229.1
    network 10.213.229.0
    broadcast 10.213.229.255
    dns-nameservers 1.1.1.1

iface eth1 inet static
    address 172.26.208.229
    netmask 255.255.255.0
    gateway 172.26.208.1
    network 172.26.208.0
    broadcast 172.26.208.255
    dns-nameservers 9.9.9.9 8.8.8.8 208.67.222.222

iface eth2 inet static
    address 10.112.77.172
    netmask 255.255.255.0
    gateway 10.112.77.1
    network 10.112.77.0
    broadcast 10.112.77.255
    dns-nameservers 208.67.222.222 8.8.8.8

mapping eth0
    script /usr/local/bin/select-profile
    map vpn loopback

mapping eth2
    script /opt/net/profile-map
    map vpn static
    map lab fallback
