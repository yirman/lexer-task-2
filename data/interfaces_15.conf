# Random interfaces configuration 15
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 172.24.239.19
    netmask 255.255.255.0
    gateway 172.24.239.1
    dns-nameservers 8.8.8.8 9.9.9.9

iface eth1 inet static
    address 10.72.153.129
    netmask 255.255.255.0
    gateway 10.72.153.1
    network 10.72.153.0
    broadcast 10.72.153.255
    dns-nameservers 9.9.9.9 1.1.1.1 8.8.8.8

mapping eth1
    script /opt/net/profile-map
    map office static
    map vpn loopback
