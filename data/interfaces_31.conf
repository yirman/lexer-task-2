# Random interfaces configuration 31
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 10.126.242.16
    netmask 255.255.255.0
    gateway 10.126.242.1
    network 10.126.242.0
    broadcast 10.126.242.255
    dns-nameservers 9.9.9.9

iface eth1 inet static
    address 172.17.0.220
    netmask 255.255.255.0
    gateway 172.17.0.1
    network 172.17.0.0
    broadcast 172.17.0.255
    dns-nameservers 1.1.1.1

mapping eth1
    script /usr/local/bin/get-network
    map vpn fallback
    map office dhcp
