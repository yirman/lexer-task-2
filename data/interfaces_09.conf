# Random interfaces configuration 9
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet static
    address 172.22.152.242
    netmask 255.255.255.0
    gateway 172.22.152.1
    network 172.22.152.0
    broadcast 172.22.152.255
    dns-nameservers 8.8.8.8

iface eth1 inet dhcp

iface eth2 inet static
    address 172.22.133.229
    netmask 255.255.255.0
    gateway 172.22.133.1
    dns-nameservers 208.67.222.222 9.9.9.9 1.1.1.1

mapping eth0
    script /usr/local/bin/select-profile
    map vpn dhcp
    map home fallback
