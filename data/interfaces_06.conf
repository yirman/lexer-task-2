# Random interfaces configuration 6
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 172.19.82.101
    netmask 255.255.255.0
    gateway 172.19.82.1
    network 172.19.82.0
    broadcast 172.19.82.255
    dns-nameservers 8.8.8.8 208.67.222.222

iface eth1 inet static
    address 10.127.238.242
    netmask 255.255.255.0
    gateway 10.127.238.1
    network 10.127.238.0
    broadcast 10.127.238.255
    dns-nameservers 8.8.8.8 208.67.222.222 1.1.1.1

mapping eth0
    script /opt/net/profile-map
    map home static
    map office dhcp
