# Random interfaces configuration 30
auto lo eth0 eth1 eth2 eth3

iface lo inet loopback

iface eth0 inet static
    address 172.20.112.84
    netmask 255.255.255.0
    gateway 172.20.112.1
    network 172.20.112.0
    broadcast 172.20.112.255
    dns-nameservers 208.67.222.222 8.8.8.8 9.9.9.9

iface eth1 inet dhcp

iface eth2 inet static
    address 172.22.173.135
    netmask 255.255.255.0
    gateway 172.22.173.1
    network 172.22.173.0
    dns-nameservers 9.9.9.9

iface eth3 inet static
    address 192.168.196.112
    netmask 255.255.255.0
    gateway 192.168.196.1
    network 192.168.196.0
    dns-nameservers 9.9.9.9 208.67.222.222 1.1.1.1

mapping eth1
    script /usr/local/bin/get-network
    map office fallback

mapping eth2
    script /opt/net/profile-map
    map lab fallback
    map vpn dhcp
