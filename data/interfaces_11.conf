# Random interfaces configuration 11
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 172.24.35.203
    netmask 255.255.255.0
    gateway 172.24.35.1
    network 172.24.35.0
    broadcast 172.24.35.255
    dns-nameservers 1.1.1.1 208.67.222.222

iface eth1 inet static
    address 192.168.46.48
    netmask 255.255.255.0
    gateway 192.168.46.1
    network 192.168.46.0
    broadcast 192.168.46.255
    dns-nameservers 208.67.222.222 1.1.1.1 8.8.8.8

mapping eth1
    script /usr/local/bin/select-profile
    map lab fallback
    map lab fallback

mapping eth0
    script /opt/net/profile-map
    map office loopback
    map office static
