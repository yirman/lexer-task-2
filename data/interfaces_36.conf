# Random interfaces configuration 36
auto lo eth0 eth1 eth2 eth3

iface lo inet loopback

iface eth0 inet dhcp

iface eth1 inet dhcp

iface eth2 inet static
    address 192.168.34.199
    netmask 255.255.255.0
    gateway 192.168.34.1
    network 192.168.34.0
    dns-nameservers 8.8.8.8 208.67.222.222 9.9.9.9

iface eth3 inet dhcp

mapping eth3
    script /usr/local/bin/get-network
    map home dhcp

mapping eth1
    script /usr/local/bin/get-network
    map lab fallback
    map lab dhcp

mapping eth0
    script /opt/net/profile-map
    map office loopback
    map lab static
    map lab static

mapping eth2
    script /usr/local/bin/select-profile
    map office static
    map home loopback
    map office static
