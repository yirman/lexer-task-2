# Random interfaces configuration 23
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 10.226.17.246
    netmask 255.255.255.0
    gateway 10.226.17.1
    network 10.226.17.0
    dns-nameservers 208.67.222.222 9.9.9.9 8.8.8.8

iface eth1 inet static
    address 172.26.166.204
    netmask 255.255.255.0
    gateway 172.26.166.1
    network 172.26.166.0
    dns-nameservers 9.9.9.9 8.8.8.8

mapping eth1
    script /usr/local/bin/select-profile
    map home static
    map office loopback
