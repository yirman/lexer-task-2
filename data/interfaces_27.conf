# Random interfaces configuration 27
auto lo eth0 eth1 eth2

iface lo inet loopback

iface eth0 inet dhcp

iface eth1 inet static
    address 172.21.217.158
    netmask 255.255.255.0
    gateway 172.21.217.1
    network 172.21.217.0
    dns-nameservers 8.8.8.8 1.1.1.1 208.67.222.222

iface eth2 inet static
    address 10.127.238.237
    netmask 255.255.255.0
    gateway 10.127.238.1
    network 10.127.238.0
    broadcast 10.127.238.255
    dns-nameservers 8.8.8.8 9.9.9.9 208.67.222.222

mapping eth2
    script /opt/net/profile-map
    map vpn loopback
    map home fallback
    map home loopback
