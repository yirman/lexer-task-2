# Random interfaces configuration 17
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 172.31.123.7
    netmask 255.255.255.0
    gateway 172.31.123.1
    network 172.31.123.0
    dns-nameservers 208.67.222.222 9.9.9.9 8.8.8.8

iface eth1 inet dhcp

mapping eth1
    script /usr/local/bin/select-profile
    map vpn static
    map lab dhcp
    map office static

mapping eth0
    script /usr/local/bin/get-network
    map vpn loopback
    map vpn dhcp
    map lab fallback
