# Random interfaces configuration 20
auto lo eth0 eth1

iface lo inet loopback

iface eth0 inet static
    address 10.22.192.234
    netmask 255.255.255.0
    gateway 10.22.192.1
    broadcast 10.22.192.255
    dns-nameservers 9.9.9.9 208.67.222.222 1.1.1.1

iface eth1 inet dhcp

mapping eth0
    script /usr/local/bin/select-profile
    map vpn fallback
    map vpn fallback
