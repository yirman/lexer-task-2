# Random interfaces configuration 39
auto lo eth0

iface lo inet loopback

iface eth0 inet static
    address 172.29.101.244
    netmask 255.255.255.0
    gateway 172.29.101.1
    network 172.29.101.0
    dns-nameservers 1.1.1.1 8.8.8.8 208.67.222.222

mapping eth0
    script /opt/net/profile-map
    map vpn dhcp
    map home static
